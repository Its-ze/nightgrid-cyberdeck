name: Build Installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci --no-audit --fund=false --prefer-online
        timeout-minutes: 12
      - run: npm run rebuild:native
      - name: Prepare Linux package hooks
        if: runner.os == 'Linux'
        run: chmod +x build/linux-deb-after-install.sh build/linux-deb-after-remove.sh
      - name: Build Linux installers
        if: runner.os == 'Linux'
        run: npm run dist:linux
      - name: Build Windows installer
        if: runner.os == 'Windows'
        run: npm run dist:win
      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightgrid-${{ runner.os }}
          path: |
            release-builds/*.AppImage
            release-builds/*.deb
            release-builds/*Setup.exe

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          prerelease: false
